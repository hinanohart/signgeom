name: docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: install mdbook
        run: cargo install --locked --version 0.4.40 mdbook
      - name: rustdoc
        run: cargo doc --workspace --no-deps
      - name: mdbook build
        working-directory: docs/book
        run: mdbook build
      - name: build web demo
        working-directory: web
        run: |
          if command -v pnpm >/dev/null; then pnpm install; else npm install; fi
          npm run build
      - name: assemble site
        run: |
          mkdir -p site
          cp -r target/doc site/rustdoc
          cp -r docs/book/book/* site/
          mkdir -p site/demo && cp -r web/dist/* site/demo/
          # Default landing page redirects to the book.
          printf '<!doctype html><meta http-equiv="refresh" content="0; url=./index.html">' > site/_landing.html
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
