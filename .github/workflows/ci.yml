name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

permissions:
  contents: read

jobs:
  rust-test:
    name: rust ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo test
        run: cargo test --workspace --all-features

  rust-msrv:
    name: rust msrv (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # master
        with:
          toolchain: "1.85"
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo build --workspace --all-features

  rust-audit:
    name: cargo audit + deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: install cargo-audit
        run: cargo install --locked cargo-audit
      - name: cargo audit
        run: cargo audit
      # cargo-deny 0.19+ requires rustc 1.88 to build from source but ships
      # precompiled binaries; we use the binary so we get current CVSS 4.0
      # advisory-DB support without the MSRV churn.
      - name: install cargo-deny
        run: |
          set -euo pipefail
          VERSION="0.19.6"
          TARBALL="cargo-deny-${VERSION}-x86_64-unknown-linux-musl.tar.gz"
          curl -fsSL -o cd.tar.gz \
            "https://github.com/EmbarkStudios/cargo-deny/releases/download/${VERSION}/${TARBALL}"
          tar -xzf cd.tar.gz
          sudo mv "cargo-deny-${VERSION}-x86_64-unknown-linux-musl/cargo-deny" /usr/local/bin/
          cargo-deny --version
      - name: cargo deny check
        run: cargo-deny check

  web-typecheck:
    name: web tsc
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - run: pnpm install --frozen-lockfile || pnpm install
      - run: pnpm typecheck
      - run: pnpm build

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      # gitleaks/gitleaks-action@v2 requires a paid GITLEAKS_LICENSE for
      # organisation accounts; we invoke the binary directly instead so the
      # job stays free and reproducible.
      - name: install gitleaks
        run: |
          set -euo pipefail
          VERSION="8.21.2"
          curl -fsSL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/
          gitleaks version
      - name: run gitleaks
        run: gitleaks detect --source . --no-banner --redact --verbose
